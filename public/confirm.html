<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Confirmando cuenta</title>
    <style>
      html, body { height: 100%; margin: 0; font-family: system-ui, -apple-system, Segoe UI, sans-serif; }
      body {
        background: #0f172a;
        color: #e2e8f0;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .card {
        background: rgba(15, 23, 42, 0.9);
        border: 1px solid #1f2937;
        padding: 28px 24px;
        border-radius: 16px;
        text-align: center;
        width: min(420px, 90vw);
      }
      .spinner {
        width: 42px; height: 42px;
        border: 3px solid #1f2937;
        border-top-color: #3b82f6;
        border-radius: 999px;
        animation: spin 1s linear infinite;
        margin: 0 auto 16px;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      p { margin: 0; font-size: 14px; color: #94a3b8; }
      h1 { margin: 0 0 10px; font-size: 18px; color: #f8fafc; }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="spinner"></div>
      <h1>Confirmando tu cuenta</h1>
      <p>En unos segundos serás redirigido a la app.</p>
    </div>
    <script>
      // Preserve hash params (access_token, refresh_token) and forward to SPA confirm route
      const hash = window.location.hash || '';
      const query = window.location.search || '';
      window.location.replace('/confirm' + query + hash);
    </script>
  </body>
</html>
