<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Confirma tu cuenta</title>
  </head>
  <body style="margin:0;background:#0f172a;font-family:Arial,Helvetica,sans-serif;color:#e2e8f0;">
    <table role="presentation" cellpadding="0" cellspacing="0" width="100%">
      <tr>
        <td align="center" style="padding:32px 16px;">
          <table role="presentation" cellpadding="0" cellspacing="0" width="600" style="max-width:600px;background:#0b1220;border:1px solid #1f2937;border-radius:16px;overflow:hidden;">
            <tr>
              <td style="padding:28px 24px;background:linear-gradient(90deg,#3b82f6,#8b5cf6);">
                <h1 style="margin:0;font-size:22px;color:#ffffff;">TrainingAI</h1>
                <p style="margin:6px 0 0;color:#e0e7ff;font-size:13px;">Confirma tu cuenta para empezar</p>
              </td>
            </tr>
            <tr>
              <td style="padding:24px;">
                <h2 style="margin:0 0 10px;font-size:18px;color:#f8fafc;">¡Ya casi estás dentro!</h2>
                <p style="margin:0 0 18px;font-size:14px;color:#94a3b8;line-height:1.6;">
                  Pulsa el botón para confirmar tu cuenta y continuar en la app.
                </p>
                <table role="presentation" cellpadding="0" cellspacing="0">
                  <tr>
                    <td style="background:#2563eb;border-radius:10px;">
                      <a href="{{ .ConfirmationURL }}" style="display:inline-block;padding:12px 18px;color:#ffffff;text-decoration:none;font-weight:bold;font-size:14px;">
                        Confirmar cuenta
                      </a>
                    </td>
                  </tr>
                </table>
                <p style="margin:18px 0 0;font-size:12px;color:#64748b;">
                  Si no solicitaste esta cuenta, puedes ignorar este correo.
                </p>
              </td>
            </tr>
            <tr>
              <td style="padding:18px 24px;border-top:1px solid #1f2937;color:#64748b;font-size:12px;">
                © TrainingAI · Hecho para tu progreso
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
